services:
  db:
    image: postgres:16-alpine
    container_name: bozarts-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bozarts
      POSTGRES_PASSWORD: bozarts_secret
      POSTGRES_DB: bozarts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bozarts"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
